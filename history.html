<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINYASEEK | Historical Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="history" class="text-green-500"></i>
                <span class="font-bold text-xl tracking-tight">DATA <span class="text-green-500">ARCHIVE</span></span>
            </div>
            <a href="index.html" class="text-xs flex items-center gap-1 hover:text-green-500 transition-colors">
                <i data-lucide="arrow-left" class="w-4"></i> BACK TO DASHBOARD
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8">
        <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-800 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-xl font-bold">Soil Nutrient History</h2>
                    <p class="text-slate-500 text-sm">Showing the latest 50 readings from Sensor Node 01</p>
                </div>
                <button onclick="exportToCSV()" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white text-xs font-bold rounded-lg transition-all flex items-center gap-2">
                    <i data-lucide="download" class="w-4"></i> EXPORT CSV
                </button>
            </div>

            <div class="overflow-x-auto">
                <table id="history-table" class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-widest">
                            <th class="p-4 border-b border-slate-800">Date & Time</th>
                            <th class="p-4 border-b border-slate-800">Nitrogen (N)</th>
                            <th class="p-4 border-b border-slate-800">Phosphorus (P)</th>
                            <th class="p-4 border-b border-slate-800">Potassium (K)</th>
                            <th class="p-4 border-b border-slate-800">Quality</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="text-sm font-mono">
                        <tr><td colspan="5" class="p-20 text-center text-slate-600 animate-pulse">Querying database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyA0Pse456BGIzMaqXzT_kVy5jvyochMXo0",
            projectId: "pinyaseek-monitor",
            storageBucket: "pinyaseek-monitor.firebasestorage.app",
            appId: "1:404671447383:web:c183a35ce932886591fe12"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const historyBody = document.getElementById('history-body');
        let csvData = [["Timestamp", "Nitrogen", "Phosphorus", "Potassium"]];

        // Fetch Data from the subcollection
        db.collection("logs").doc("node_1").collection("readings")
          .orderBy("timestamp", "desc")
          .limit(50)
          .onSnapshot((querySnapshot) => {
            historyBody.innerHTML = "";
            csvData = [["Timestamp", "Nitrogen", "Phosphorus", "Potassium"]]; // Reset CSV data

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const ts = data.timestamp ? data.timestamp.toDate() : new Date();
                const timeStr = ts.toLocaleString();

                // Add to CSV Array
                csvData.push([timeStr, data.n, data.p, data.k]);

                // Create Row
                const row = `
                    <tr class="border-b border-slate-800/50 hover:bg-white/5 transition-all">
                        <td class="p-4 text-slate-400">${timeStr}</td>
                        <td class="p-4 text-blue-400 font-bold">${data.n} <span class="text-[10px] opacity-50">mg/kg</span></td>
                        <td class="p-4 text-purple-400 font-bold">${data.p} <span class="text-[10px] opacity-50">mg/kg</span></td>
                        <td class="p-4 text-orange-400 font-bold">${data.k} <span class="text-[10px] opacity-50">mg/kg</span></td>
                        <td class="p-4">
                            <span class="px-2 py-0.5 rounded-full text-[10px] bg-green-500/10 text-green-500 border border-green-500/20">STABLE</span>
                        </td>
                    </tr>
                `;
                historyBody.innerHTML += row;
            });
        });

        // Simple CSV Export Function
        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8," + csvData.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "pinyaseek_soil_history.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
