<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINYASEEK | AI Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="sprout" class="text-green-500"></i>
                <span class="font-bold text-xl tracking-tight">PINYASEEK <span class="text-green-500">v1.0</span></span>
            </div>
            <div class="flex items-center gap-4 text-xs">
                <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> SYSTEM LIVE</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8 space-y-8">
        <section>
            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="video" class="text-slate-400 w-5"></i>
                    <h2 class="text-lg font-semibold">Live Field Feeds</h2>
                </div>
                <a href="history.html" class="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg border border-slate-700 transition-all text-sm font-medium">
                    <i data-lucide="table-2" class="w-4 h-4 text-green-500"></i>
                    View Full History
                </a>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="group relative bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-green-500/50 transition-all">
                    <div class="absolute top-3 left-3 z-10 bg-black/60 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest">Zone 01 - North</div>
                    <img id="img-node_1" src="https://via.placeholder.com/640x360?text=Initializing+Feed..." class="w-full aspect-video object-cover bg-slate-800" alt="Cam 1 Stream">
                </div>
                <div class="group relative bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-green-500/50 transition-all">
                    <div class="absolute top-3 left-3 z-10 bg-black/60 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest">Zone 02 - South</div>
                    <img id="img-node_2" src="https://via.placeholder.com/640x360?text=Initializing+Feed..." class="w-full aspect-video object-cover bg-slate-800" alt="Cam 2 Stream">
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest">Sensor Node 01</h3>
                        <p class="text-2xl font-semibold">Soil Composition</p>
                    </div>
                    <i data-lucide="database" class="text-blue-500"></i>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center p-3 bg-slate-800/50 rounded-xl">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Nitrogen</span>
                        <span id="s1-n" class="text-xl font-mono text-blue-400">--</span>
                    </div>
                    <div class="text-center p-3 bg-slate-800/50 rounded-xl">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Phos.</span>
                        <span id="s1-p" class="text-xl font-mono text-purple-400">--</span>
                    </div>
                    <div class="text-center p-3 bg-slate-800/50 rounded-xl">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Potas.</span>
                        <span id="s1-k" class="text-xl font-mono text-orange-400">--</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest">Sensor Node 02</h3>
                        <p class="text-2xl font-semibold">Soil Composition</p>
                    </div>
                    <i data-lucide="database" class="text-green-500"></i>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center p-3 bg-slate-800/50 rounded-xl">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Nitrogen</span>
                        <span id="s2-n" class="text-xl font-mono text-blue-400">--</span>
                    </div>
                    <div class="text-center p-3 bg-slate-800/50 rounded-xl">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Phos.</span>
                        <span id="s2-p" class="text-xl font-mono text-purple-400">--</span>
                    </div>
                    <div class="text-center p-3 bg-slate-800/50 rounded-xl">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Potas.</span>
                        <span id="s2-k" class="text-xl font-mono text-orange-400">--</span>
                    </div>
                </div>
            </div>
        </section>

        <div class="bg-gradient-to-r from-blue-600/20 to-green-600/20 p-6 rounded-2xl border border-white/10 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-white/10 rounded-full"><i data-lucide="brain-circuit" class="text-white"></i></div>
                <div>
                    <h4 class="text-sm font-bold uppercase opacity-60">ML Prediction Engine</h4>
                    <p id="prediction" class="text-lg font-medium text-green-400">Monitoring real-time stability...</p>
                </div>
            </div>
            <button class="px-6 py-2 bg-white text-black font-bold rounded-full hover:bg-green-400 transition-colors">Run Manual Scan</button>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // --- WebSocket Logic (Replacing Firebase) ---
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${protocol}//${window.location.host}`);
        
        // Variable to track which node the next incoming image belongs to
        let activeNode = "node_1";

        socket.onopen = () => {
            console.log("Connected to Pinyaseek Stream Server");
        };

        socket.onmessage = async (event) => {
            // CASE 1: Handle Text Data (Node IDs or Sensor JSON)
            if (typeof event.data === 'string') {
                if (event.data.startsWith("id:")) {
                    // The ESP32 sends "id:node_1" right before the image bytes
                    activeNode = event.data.split(":")[1];
                } else {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === "sensor") {
                            // Map node_1 -> s1 and node_2 -> s2
                            const prefix = data.node === "node_1" ? "s1" : "s2";
                            
                            document.getElementById(`${prefix}-n`).innerText = data.n + " mg/kg";
                            document.getElementById(`${prefix}-p`).innerText = data.p + " mg/kg";
                            document.getElementById(`${prefix}-k`).innerText = data.k + " mg/kg";
                        }
                    } catch (e) {
                        // Not sensor JSON, ignore
                    }
                }
            } 
            // CASE 2: Handle Binary Data (The JPEG Image)
            else if (event.data instanceof Blob) {
                const url = URL.createObjectURL(event.data);
                const imgElement = document.getElementById(`img-${activeNode}`);
                if (imgElement) {
                    imgElement.src = url;
                }
                // Memory Management: Revoke the URL after the image is rendered
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }
        };

        socket.onclose = () => {
            console.log("Disconnected from Server");
            // Optional: Turn the "System Live" dot red if disconnected
            document.querySelector('.animate-pulse').classList.replace('bg-green-500', 'bg-red-500');
        };
    </script>
</body>
</html>
