<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINYASEEK | Smart Field Monitor</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

<header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i data-lucide="sprout" class="text-green-500"></i>
            <span class="font-bold text-xl tracking-tight">
                PINYASEEK <span class="text-green-500 text-sm">PRO</span>
            </span>
        </div>

        <div id="status-badge" class="flex items-center gap-4 text-[10px] font-bold uppercase">
            <span class="flex items-center gap-1.5">
                <span id="status-dot" class="w-2.5 h-2.5 bg-yellow-500 rounded-full animate-pulse"></span>
                <span id="status-text">Connecting</span>
            </span>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto p-4 lg:p-8 space-y-8">

<!-- LIVE FEEDS -->
<section>
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold text-slate-300 flex items-center gap-2">
            <i data-lucide="video"></i> Live Field Feeds
        </h2>

        <a href="history.html" class="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 text-sm">
            View Historical Data
        </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <img id="img-node_1" src="https://via.placeholder.com/640x360?text=Node+1" class="rounded-xl border border-slate-800">
        <img id="img-node_2" src="https://via.placeholder.com/640x360?text=Node+2" class="rounded-xl border border-slate-800">
    </div>
</section>

<!-- TELEMETRY -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
    <h3 class="text-blue-400 text-xs mb-2">Telemetry Node 01</h3>
    <div class="grid grid-cols-3 gap-3">
        <div class="text-center">N<br><span id="s1-n">--</span></div>
        <div class="text-center">P<br><span id="s1-p">--</span></div>
        <div class="text-center">K<br><span id="s1-k">--</span></div>
    </div>
</div>

<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
    <h3 class="text-green-400 text-xs mb-2">Telemetry Node 02</h3>
    <div class="grid grid-cols-3 gap-3">
        <div class="text-center">N<br><span id="s2-n">--</span></div>
        <div class="text-center">P<br><span id="s2-p">--</span></div>
        <div class="text-center">K<br><span id="s2-k">--</span></div>
    </div>
</div>

</section>

<!-- AI INSIGHTS -->
<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex justify-between items-center">
    <div>
        <h4 class="text-xs text-slate-500">AI Crop Insights</h4>
        <p id="prediction">Analyzing soil patterns...</p>
    </div>

    <button onclick="requestManualScan()" class="bg-white text-black px-4 py-2 rounded-lg">
        Manual Sync
    </button>
</div>

</main>

<script>
lucide.createIcons();

// --- WEBSOCKET ---
const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const socket = new WebSocket(`${protocol}//${window.location.host}`);

let lastIdentifiedNode = "node_1";

const UI = {
    dot: document.getElementById('status-dot'),
    text: document.getElementById('status-text'),
    prediction: document.getElementById('prediction')
};

socket.onopen = () => {
    UI.dot.className = "w-2.5 h-2.5 bg-green-500 rounded-full";
    UI.text.innerText = "System Live";
};

socket.onclose = () => {
    UI.dot.className = "w-2.5 h-2.5 bg-red-500 rounded-full";
    UI.text.innerText = "System Offline";
};

// --- MESSAGE HANDLER ---
socket.onmessage = async (event) => {
    if (event.data instanceof Blob) {
        if (event.data.size < 100) {
            const text = await event.data.text();
            handleIncomingText(text);
        } else {
            updateFrame(event.data, lastIdentifiedNode);
        }
    } else if (typeof event.data === 'string') {
        handleIncomingText(event.data);
    }
};

function handleIncomingText(text) {
    if (text.startsWith("id:")) {
        lastIdentifiedNode = text.split(":")[1].trim();
        return;
    }

    try {
        const json = JSON.parse(text);
        if (json.type === "sensor") {
            updateSensorUI(json);
        }
    } catch {}
}

function updateFrame(blob, nodeId) {
    const url = URL.createObjectURL(blob);
    const target = document.getElementById(`img-${nodeId}`);

    if (target) {
        target.src = url;
        target.onload = () => URL.revokeObjectURL(url);
    }
}

function updateSensorUI(data) {
    const prefix = data.node === "node_1" ? "s1" : "s2";

    document.getElementById(`${prefix}-n`).innerText = data.n;
    document.getElementById(`${prefix}-p`).innerText = data.p;
    document.getElementById(`${prefix}-k`).innerText = data.k;

    UI.prediction.innerText =
        `Data update from ${data.node === "node_1" ? "North" : "South"} received.`;
}

function requestManualScan() {
    socket.send(JSON.stringify({ type: "command", action: "scan_now" }));
    alert("Manual synchronization command sent.");
}
</script>

</body>
</html>
